<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المشرف</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <h1>شاشة متابعة الطلبات</h1>
    <div id="orders-list"></div>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        const channel = ably.channels.get('hotel-channel');

        // الربط: "لو جالك رسالة جديدة، نفذ الكود ده"
        channel.subscribe('new-order', (message) => {
            const data = message.data;
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML += `
                <div style="border:1px solid gold; padding:10px; margin:5px;">
                    طلب جديد من غرفة ${data.room}: ${data.service} <br>
                    <small>الوقت: ${data.time}</small>
                </div>
            `;
        });
    </script>
</body>
</html>
