<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة استقبال الطلبات</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background: #000; color: #00ff00; padding: 20px; font-family: monospace; }
        .order { border: 1px solid #00ff00; padding: 15px; margin: 10px; }
    </style>
</head>
<body>
    <h1>مراقب الطلبات اللحظي</h1>
    <div id="display"></div>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        const channel = ably.channels.get('hotel-orders');

        // استماع مستمر للطلبات
        channel.subscribe('new-order', (m) => {
            document.getElementById('display').innerHTML += 
            `<div class="order">طلب جديد: ${m.data.service} - الساعة: ${m.data.time}</div>`;
        });
    </script>
</body>
</html>
