<script>
    const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
    const channel = ably.channels.get('hotel-orders');

    // 1. عند تحميل الصفحة، اعرض الطلبات القديمة المحفوظة
    window.onload = function() {
        const savedOrders = localStorage.getItem('allOrders') || "";
        document.getElementById('display').innerHTML = savedOrders;
    };

    // 2. عند وصول طلب جديد، احفظه في الذاكرة الدائمة
    channel.subscribe('new-order', (m) => {
        const newOrder = `<div class="order">طلب جديد: ${m.data.service} - الساعة: ${m.data.time}</div>`;
        
        // جيب القديم + الجديد
        const currentOrders = localStorage.getItem('allOrders') || "";
        const updatedOrders = newOrder + currentOrders;
        
        // احفظ في الذاكرة الدائمة
        localStorage.setItem('allOrders', updatedOrders);
        
        // حدث الشاشة
        document.getElementById('display').innerHTML = updatedOrders;
    });
</script>
